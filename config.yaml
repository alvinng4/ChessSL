engine:
  model_path: "/home/alvin/ChessSL/models/model_epoch30.pt"
  device: "cuda:0"                       # "cpu" or "cuda:0"
  default_num_nodes: 5096               # Number of nodes if it is not specified in the command "go"
  mcts_batch_size: 128
  mcts_batches_early_stop: 1024         # Early stop if the batch is not filled after this iterations
  nps: 1500                             # Estimated nodes per second 
  engine_move_time_factor: 0.05         # Move time factor = engine_move_time_factor * remaining time         
  c_puct: 1.1
  c_fpu: 0.2
  virtual_loss: 3.0

training:
  create_new_model: True
  current_epochs: 0
  model_dir: "models"
  load_model_name: "model_epoch0.pt"
  training_data_dir: "/home/alvin/chessSL_training_data_t80"
  device: "cuda:0"                       # "cpu" or "cuda:0"
  batch_size: 512
  data_loader_num_workers: 4
  data_loader_pin_memory: True
  num_epochs: 100
  learning_rate: 0.001
  momentum: 0.9
  policy_weight: 1.0
  winner_weight: 1.0
  mlh_weight: 0.0005
  log_dir: "chessSL_training_logs"
  log_interval: 200                      # Log training status every log_interval batches
  save_interval: 10                      # Save model every save_interval epochs


